<div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-glow rounded-full blur-[100px] opacity-60"></div>
<div class="absolute bottom-1/4 right-1/4 w-[600px] h-[600px] bg-glow rounded-full blur-[120px] opacity-40"></div>

</div>
<!-- Login Container -->
<main class="flex-grow flex items-center justify-center p-6 z-10">
<div class="glass-card w-full max-w-[440px] rounded-[20px] p-10 flex flex-col gap-8 transition-all duration-500 ease-out hover:scale-[1.01]">
<!-- Logo & Title -->
<div class="text-center space-y-2">
<div class="flex justify-center mb-4">
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined text-on-primary-container text-[28px]" style="font-variation-settings: 'FILL' 1;">terminal</span>
</div>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">PyAudit AI</h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80">Secure developer environment</p>
</div>
<!-- Form -->
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="email">Work Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px] group-focus-within:text-primary transition-colors">alternate_email</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-11 pr-4 text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary-container/20 focus:border-primary transition-all duration-200" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-surface-variant block" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px] group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-11 pr-12 text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary-container/20 focus:border-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline-variant hover:text-outline transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-3.5 rounded-lg font-semibold hover:brightness-110 active:scale-[0.98] transition-all shadow-lg shadow-primary-container/10" type="submit">
                    Sign In
                </button>
</form>

<div class="flex-grow border-t border-outline-variant opacity-30"></div>

<!-- Interactive Logic for visual feedback -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            const submitBtn = form.querySelector('button[type="submit"]');

            submitBtn.addEventListener('click', (e) => {
                const originalText = submitBtn.innerText;
                submitBtn.innerText = 'Authenticating...';
                submitBtn.disabled = true;
                
                // Simulate loading state
                setTimeout(() => {
                    submitBtn.innerText = originalText;
                    submitBtn.disabled = false;
                }, 1500);
            });

            // Parallax effect on mouse move for the glass card
            const card = document.querySelector('.glass-card');
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 100;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 100;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) scale(1.01)`;
            });
        });
    </script>
